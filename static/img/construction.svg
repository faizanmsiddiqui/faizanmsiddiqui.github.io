     inkscape:zoom="2.0175"
     inkscape:cx="245.84882"
     inkscape:cy="200"
     inkscape:window-width="1920"
     inkscape:window-height="1009"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg4" />
  <defs
     id="defs2">
    <!-- Soft pastel gradient -->
    <linearGradient
