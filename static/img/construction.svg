       id="linearGradient4"
       x1="-27.550425"
       y1="-54.307621"
       x2="37.353806"
       y2="10.596609"
       gradientTransform="scale(1.1027365,0.90683492)"
       gradientUnits="userSpaceOnUse" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#pastelGradient"
       id="linearGradient5"
       x1="-58.736366"
       y1="173.63826"
       x2="58.311287"
       y2="290.68591"
       gradientTransform="scale(3.7492742,0.26671829)"
       gradientUnits="userSpaceOnUse" />
  </defs>
  <!-- Center content -->
  <g
